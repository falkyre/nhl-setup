# Configuration for the NHL LED Scoreboard Control Hub
# All values are optional. If a value is not present, the default from the script will be used.
# The scoreboard_dir can be overridden by the --scoreboard_dir command-line argument, which takes the highest precedence.

# SUPERVISOR_URL = "127.0.0.1"
# SUPERVISOR_PORT = 9001
# PORT = 8000
# Set the PYTHON_EXEC to the full path of your Scoreboard venv's python executable: 
# eg /home/pi/nhlsb-venv/bin/python3
# PYTHON_EXEC = "/usr/bin/python3"
# scoreboard_dir = "."

[login]
# The default username and password for the terminal.
# It is recommended to change these values.
USERNAME = "admin"
PASSWORD = "password"
# A secret key for the web application. This should be a long, random string.
# You can generate one using: python -c 'import os; print(os.urandom(24).hex())'
SECRET_KEY = "supersecretkey"